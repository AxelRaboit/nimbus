framework:
    rate_limiter:
        transfer_unlock:
            policy: fixed_window
            limit: 5
            interval: '5 minutes'
        home_verify_access:
            policy: fixed_window
            limit: 5
            interval: '15 minutes'
        home_request_access:
            policy: fixed_window
            limit: 3
            interval: '1 hour'
        transfer_create:
            policy: sliding_window
            limit: 15
            interval: '1 hour'
        transfer_finalize:
            policy: sliding_window
            limit: 20
            interval: '1 hour'
