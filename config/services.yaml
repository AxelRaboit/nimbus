# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    tus_upload_path: '%kernel.project_dir%/var/uploads/tus_tmp'
    app.access_password: '%env(string:ACCESS_PASSWORD)%'
    app.dev_password: '%env(string:DEV_PASSWORD)%'
    tus_cache_path: '%kernel.project_dir%/var/cache/tus'
    transfer_storage_path: '%kernel.project_dir%/var/uploads/transfers'
    mailer.sender: '%env(MAILER_FROM_ADDRESS)%'
    mailer.sender_name: '%env(MAILER_FROM_NAME)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $accessPassword: '%app.access_password%'
            string $devPassword: '%app.dev_password%'
            string $env: '%kernel.environment%'

    App\:
        resource: '../src/'

    App\Controller\TusController:
        arguments:
            $tusUploadPath: '%tus_upload_path%'
            $tusCachePath: '%tus_cache_path%'
        tags: ['controller.service_arguments']

    App\Service\TusUploadService:
        arguments:
            $tusCachePath: '%tus_cache_path%'
            $tusUploadPath: '%tus_upload_path%'

    App\Manager\TransferManager:
        arguments:
            $transferStoragePath: '%transfer_storage_path%'

    App\Storage\LocalStorageAdapter:
        arguments:
            $transferStoragePath: '%transfer_storage_path%'

    App\Storage\R2StorageAdapter:
        arguments:
            $endpoint: '%env(R2_ENDPOINT)%'
            $accessKeyId: '%env(R2_ACCESS_KEY_ID)%'
            $secretAccessKey: '%env(R2_SECRET_ACCESS_KEY)%'
            $bucket: '%env(R2_BUCKET)%'

    App\Storage\StorageManager:
        arguments:
            $local: '@App\Storage\LocalStorageAdapter'
            $r2: '@App\Storage\R2StorageAdapter'

    App\EventSubscriber\SecurityHeadersSubscriber:
        arguments:
            $r2Endpoint: '%env(R2_ENDPOINT)%'

    App\MessageHandler\EmailQueueMessageHandler:
        arguments:
            $mailerSender: '%mailer.sender%'
            $mailerSenderName: '%mailer.sender_name%'

    App\Contract\UserManagerInterface: '@App\Manager\UserManager'
    App\Contract\AccessRequestManagerInterface: '@App\Manager\AccessRequestManager'
    App\Contract\PasswordResetManagerInterface: '@App\Manager\PasswordResetManager'

    App\Service\TransferNotifier: ~

    App\Twig\VersionExtension:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: ['twig.extension']

    App\Twig\AppEnvironmentExtension:
        arguments:
            $appEnv: '%kernel.environment%'
        tags: ['twig.extension']
