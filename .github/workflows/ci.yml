name: CI

on:
  push:
  pull_request:

jobs:
  symfony:
    name: Symfony 7.4 | PHP ${{ matrix.php-version }} | Node ${{ matrix.node-version }} | PNPM ${{ matrix.pnpm-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php-version: [ 8.4 ]
        node-version: [ 24 ]
        pnpm-version: [ 10 ]
    env:
      extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql, dom, filter, json, gd, zip, tokenizer
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: "!ChangeMe!"
          POSTGRES_DB: nimbus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # —— Setup GitHub actions 🐙 ———————————————————————————————————————————
      - name: Checkout
        uses: actions/checkout@v6

      # —— PHP & Composer 🧙 ————————————————————————————————————————————————
      - name: Setup PHP, extensions & composer with shivammathur/setup-php
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          extensions: ${{ env.extensions }}
          ini-values: post_max_size=256M, max_execution_time=180
        env:
          update: true

      - name: Check PHP Version
        run: php -v

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache PHP dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-ansi --no-interaction --prefer-dist

      - name: Check if any dependencies are compromised
        run: composer audit || true

      - name: Install PHP code quality tools
        run: |
          (cd tools/php-cs-fixer && composer install && chmod +x vendor/bin/*)
          (cd tools/twig-cs-fixer && composer install && chmod +x vendor/bin/*)
          (cd tools/rector && composer install && chmod +x vendor/bin/*)
          (cd tools/phpstan && composer install && chmod +x vendor/bin/*)

      # —— PNPM & Vite 🟨 ——————————————————————————————————————————————————
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ matrix.pnpm-version }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build assets
        run: pnpm build

      # —— Coding standards ✨ ——————————————————————————————————————————————
      - name: PHP CS Fixer
        run: make lint-php

      - name: Twig CS Fixer
        run: make lint-twig

      - name: Lint JavaScript
        run: make lint-js

      - name: Create cache directories
        run: mkdir -p var/cache/rector var/cache/phpstan

      - name: Rector Cache
        uses: actions/cache@v5
        with:
          path: var/cache/rector
          key: ${{ runner.os }}-rector-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-rector-

      - name: Rector
        run: make rector

      # —— Static analysis ✨ ———————————————————————————————————————————————
      - name: PHPStan Cache
        uses: actions/cache@v5
        with:
          path: var/cache/phpstan
          key: phpstan-${{ runner.os }}-${{ hashFiles('tools/phpstan/phpstan.neon') }}
          restore-keys: phpstan-${{ runner.os }}-

      - name: PHPStan
        run: make stan

      # —— Test database 🗄️ ——————————————————————————————————————————————————
      - name: Create test database
        env:
          PGPASSWORD: "!ChangeMe!"
        run: psql -h 127.0.0.1 -U app -d nimbus -c "CREATE DATABASE nimbus_test;"

      - name: Run migrations on test database
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Initialise application parameters on test database
        run: php bin/console nimbus:application-parameter --env=test

      # —— Tests 🧪 —————————————————————————————————————————————————————————
      - name: Run unit tests
        run: make test-backend-unit

      - name: Run integration tests
        run: make test-backend-integration
